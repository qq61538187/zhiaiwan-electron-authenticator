name: Changeset Check

on:
  pull_request:
    branches:
      - main

jobs:
  changeset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure changeset exists
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^\.changeset/.+\.md$' >/dev/null; then
            echo "Changeset found."
            exit 0
          fi
          echo "No changeset file detected. Run 'npm run changeset' and commit the generated .changeset/*.md file."
          exit 1
