name: Release On Version Change

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check package version change
        id: check
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=""

          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            PREV_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).version||'')}catch{console.log('')}})")
          fi

          # When previous commit/version is unavailable (e.g. early history),
          # avoid failing the workflow under `bash -e`.
          if [ -z "${PREV_VERSION}" ]; then
            PREV_VERSION="${CURRENT_VERSION}"
          fi

          echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${CURRENT_VERSION}" != "${PREV_VERSION}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${PREV_VERSION} -> ${CURRENT_VERSION}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version not changed."
          fi

  build-macos:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts (x64 + arm64)
        run: npm run dist:mac:both

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*

  build-windows:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts (x64 + arm64)
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*

  publish-release:
    needs:
      - detect-version-change
      - build-macos
      - build-windows
    if: needs.detect-version-change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version-change.outputs.version }}
          name: v${{ needs.detect-version-change.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
